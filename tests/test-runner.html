<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Runner - Random Dinner Table Seating</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            background-color: #f8f9fa;
        }
        .test-results {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 1rem;
        }
        .test-pass { color: #27ae60; }
        .test-fail { color: #e74c3c; }
        .test-section { margin-bottom: 1.5rem; }
        .test-section h3 { color: #2c3e50; margin-bottom: 0.5rem; }
        .test-item { margin: 0.5rem 0; padding: 0.5rem; border-left: 3px solid #ecf0f1; }
        .test-item.pass { border-left-color: #27ae60; background-color: #d5f4e6; }
        .test-item.fail { border-left-color: #e74c3c; background-color: #fdeaea; }
        #run-tests-btn {
            padding: 1rem 2rem;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        #run-tests-btn:hover { background-color: #2980b9; }
    </style>
</head>
<body>
    <h1>Test Runner</h1>
    <button id="run-tests-btn">Run All Tests</button>
    <div id="test-results" class="test-results">
        <p>Click "Run All Tests" to execute the test suite.</p>
    </div>

    <script src="test-framework.js"></script>
    <script src="dom-tests.js"></script>
    <script src="app-tests.js"></script>
    <script src="../scripts/models.js"></script>
    <script src="models-tests.js"></script>
    <script>
        document.getElementById('run-tests-btn').addEventListener('click', function() {
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '<p>Running tests...</p>';
            
            setTimeout(() => {
                TestFramework.runAllTests();
                TestFramework.displayResults(resultsDiv);
            }, 100);
        });
    </script>
</body>
</html>
