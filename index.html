<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Dinner Table Seating</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header>
        <h1>Random Dinner Table Seating</h1>
    </header>
    
    <main class="app-container">
        <div class="config-panel">
            <section class="table-setup">
                <h2>Table Setup</h2>
                <!-- Table configuration inputs will go here -->
            </section>
            
            <section class="guest-list">
                <h2>Guest List</h2>
                <!-- Guest list input will go here -->
            </section>
            
            <section class="constraints">
                <h2>Constraints</h2>
                <!-- Constraint inputs will go here -->
            </section>
            
            <section class="generate-section">
                <button type="button" class="generate-btn">Generate Seating</button>
            </section>
        </div>
        
        <div class="table-display">
            <div id="table-display">
                <!-- Visual table representation will be rendered here -->
            </div>
        </div>
    </main>
    
    <script src="scripts/app.js"></script>
</body>
</html>
