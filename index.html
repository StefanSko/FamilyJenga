<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Dinner Table Seating</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header>
        <h1>Random Dinner Table Seating</h1>
    </header>
    
    <main class="app-container">
        <div class="config-panel">
            <section class="table-setup">
                <h2>Table Setup</h2>
                <div class="input-group">
                    <label for="topSeats">Top Seats</label>
                    <input type="number" id="topSeats" name="topSeats" min="0" max="20" value="2">
                </div>
                <div class="input-group">
                    <label for="rightSeats">Right Seats</label>
                    <input type="number" id="rightSeats" name="rightSeats" min="0" max="20" value="2">
                </div>
                <div class="input-group">
                    <label for="bottomSeats">Bottom Seats</label>
                    <input type="number" id="bottomSeats" name="bottomSeats" min="0" max="20" value="2">
                </div>
                <div class="input-group">
                    <label for="leftSeats">Left Seats</label>
                    <input type="number" id="leftSeats" name="leftSeats" min="0" max="20" value="2">
                </div>
                <div class="total-display">
                    <strong>Total Seats: <span id="total-seats">8</span></strong>
                </div>
                <div id="table-validation-errors" class="validation-errors"></div>
            </section>
            
            <section class="guest-list">
                <h2>Guest List</h2>
                <div class="guest-input-container">
                    <label for="guest-list-input">Guest Names (one per line)</label>
                    <textarea id="guest-list-input" rows="10" placeholder="Enter guest names (one per line):&#10;Alice&#10;Bob&#10;Charlie&#10;Diana"></textarea>
                </div>
                <div class="guest-count-display">
                    <span id="guest-count">0</span> guests entered
                </div>
                <div id="guest-validation-errors" class="validation-errors"></div>
            </section>
            
            <section class="constraints">
                <h2>Constraints</h2>
                <!-- Constraint inputs will go here -->
            </section>
            
            <section class="generate-section">
                <button type="button" class="generate-btn">Generate Seating</button>
            </section>
        </div>
        
        <div class="table-display">
            <div id="table-display">
                <!-- Visual table representation will be rendered here -->
            </div>
        </div>
    </main>
    
    <script src="scripts/models.js"></script>
    <script src="scripts/validation.js"></script>
    <script src="scripts/tableRenderer.js"></script>
    <script src="scripts/app.js"></script>
</body>
</html>
